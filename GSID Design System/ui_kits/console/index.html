<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GSID Console</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="icon" href="../../assets/logos/gsi-mark-green.svg">
<meta name="ext-resource-dependency" content="../../assets/logos/gsi-mark-white.svg" data-resource-id="sidebarLogo" />
<template id="__bundler_thumbnail" data-bg-color="#0B160D">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0B160D"/>
    <circle cx="600" cy="360" r="150" fill="none" stroke="#298937" stroke-width="22"/>
    <path d="M600 360 L600 210 A150 150 0 0 1 731 435 Z" fill="#298937"/>
    <text x="600" y="600" font-family="Arial, sans-serif" font-size="120" font-weight="700" fill="#ffffff" text-anchor="middle">GSID</text>
    <text x="600" y="670" font-family="monospace" font-size="34" fill="#79B886" text-anchor="middle">Operator Console</text>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>html,body{margin:0}</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Harvest.jsx"></script>
<script type="text/babel" src="Directory.jsx"></script>
<script type="text/babel" src="Sources.jsx"></script>
<script type="text/babel" data-presets="react">
  function App() {
    const [view, setView] = React.useState('dashboard');
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    const screens = {
      dashboard: <window.Dashboard onRun={() => setView('harvest')} />,
      harvest: <window.Harvest onLaunch={() => setView('dashboard')} />,
      directory: <window.Directory />,
      sources: <window.Sources />,
    };
    return (
      <window.Shell active={view} onNav={setView} onRun={() => setView('harvest')}>
        {screens[view]}
      </window.Shell>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
