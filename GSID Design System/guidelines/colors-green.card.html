<!-- @dsCard group="Colors" viewport="700x180" name="Brand green ramp" subtitle="Primary green #298937 with full tint/shade ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); font-family: var(--font-body); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font: var(--type-mono-sm); }
  .meta { display: flex; gap: 6px; margin-top: 10px; font: var(--type-caption); color: var(--text-muted); }
  .meta b { color: var(--text-heading); font-weight: var(--weight-semibold); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--green-50)"><span style="color:#0B160D">50</span></div>
    <div class="sw" style="background:var(--green-100)"><span style="color:#0B160D">100</span></div>
    <div class="sw" style="background:var(--green-200)"><span style="color:#0B160D">200</span></div>
    <div class="sw" style="background:var(--green-300)"><span style="color:#0B160D">300</span></div>
    <div class="sw" style="background:var(--green-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--green-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--green-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--green-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--green-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--green-900)"><span style="color:#fff">900</span></div>
    <div class="sw" style="background:var(--green-950)"><span style="color:#fff">950</span></div>
  </div>
  <div class="meta"><b>--green-500</b> #298937 · primary &nbsp;·&nbsp; <b>--green-700</b> #117122 · logomark / pressed</div>
</body>
</html>
