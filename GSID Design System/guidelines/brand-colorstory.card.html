<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-body); }
  .row { display: flex; height: 130px; }
  .col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .col span { font: var(--type-mono-sm); }
  .col strong { font: var(--type-label); margin-bottom: 2px; }
  .w1 { flex: 2.2; }
</style>
</head>
<body>
  <div class="row">
    <div class="col w1" style="background:var(--green-500)"><strong style="color:#fff">Brand green</strong><span style="color:#fff">#298937</span></div>
    <div class="col" style="background:var(--green-900)"><strong style="color:#fff">Deep</strong><span style="color:#fff">#073D10</span></div>
    <div class="col" style="background:var(--neutral-900)"><strong style="color:#fff">Ink</strong><span style="color:#fff">#0B160D</span></div>
    <div class="col" style="background:var(--neutral-250)"><strong style="color:#0B160D">Sage</strong><span style="color:#0B160D">#D4DED5</span></div>
    <div class="col" style="background:var(--neutral-200)"><strong style="color:#0B160D">Grey</strong><span style="color:#0B160D">#D5D6D6</span></div>
  </div>
</body>
</html>
