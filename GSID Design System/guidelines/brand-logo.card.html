<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--bg-canvas); font-family: var(--font-body); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { display: flex; align-items: center; justify-content: center; padding: 36px; min-height: 180px; }
  .light { background: var(--neutral-0); border-right: 1px solid var(--border-subtle); }
  .dark { background: var(--green-700); }
  .panel img { width: 260px; height: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel light"><img src="../assets/logos/gsi-logo-green.svg" alt="GSI logo green on white"></div>
    <div class="panel dark"><img src="../assets/logos/gsi-logo-white.svg" alt="GSI logo white on green"></div>
  </div>
</body>
</html>
