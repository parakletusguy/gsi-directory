<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-canvas); font-family: var(--font-body); }
  .big { font-family: var(--font-display); color: var(--text-heading); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); }
  .hero { font-size: 64px; }
  .sub { font-size: 32px; color: var(--brand); }
  .meta { font: var(--type-mono-sm); color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="big hero">Global South research</div>
  <div class="big sub">Visible by design</div>
  <div class="meta">Coolvetica · --font-display · weights 400 · use ≥ 28px only</div>
</body>
</html>
