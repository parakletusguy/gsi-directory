<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; align-items: start; }
  i[data-lucide] { width: 17px; height: 17px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.GSIDDesignSystem_019e0b;
  function Demo() {
    return (
      <div className="grid">
        <Input label="Search researchers" iconLeft={<i data-lucide="search"></i>} placeholder="Name, institution or email" />
        <Select label="Discipline" options={['All disciplines','Public health','Agronomy','Climate science']} />
        <Input label="Email" error="Enter a valid address" defaultValue="amina@" />
        <Input label="Target region" hint="One region per field" defaultValue="Nigeria" />
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <Checkbox label="OpenAlex" description="Open API · primary author discovery" defaultChecked />
          <Checkbox label="AJOL" description="Ethical scrape · 3s rate-limit" />
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <Switch label="Respect robots.txt" defaultChecked />
          <Switch label="Randomise delay (1–5s)" defaultChecked />
          <Switch label="Deduplicate by email" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
